server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name portal.aat.local;

    root /var/www/portal;
    index index.html;

    client_max_body_size 12M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), browsing-topics=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-store" always;
    }

    location ~* ^/uploads/.*\.(php|pl|py|cgi|sh|bash|exe|js|mjs|cjs|html|htm|svg|xml)$ {
        deny all;
    }

    location /uploads/photos/ {
        alias /home/admin865/aat-internal-portal/backend/uploads/photos/;
        access_log off;
        expires 7d;
        autoindex off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /uploads/tickets/ {
        alias /home/admin865/aat-internal-portal/backend/uploads/tickets/;
        access_log off;
        expires 7d;
        autoindex off;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Disposition "attachment" always;
    }

    location /uploads/ {
        alias /home/admin865/aat-internal-portal/backend/uploads/;
        access_log off;
        expires 7d;
        autoindex off;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}